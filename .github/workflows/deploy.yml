name: Serverless Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name:
        uses: actions/checkout@v4

      - name:
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name:
        run: npm run test

      - name:
        # We only want to actually deploy on push to main branch (not merely PRs!)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx serverless deploy --stage production
        env:
          # Serverless automatically intercepts these via process.env during build logic securely!
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          OPENSEARCH_NODE: ${{ secrets.OPENSEARCH_NODE }}
